<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vktito (@adnz.png) • Fotos e Vídeos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #fafafa;
            color: #262626;
        }

        /* Barra de Navegação no Topo */
        .navbar {
            background-color: #ffffff;
            border-bottom: 1px solid #dbdbdb;
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 10px 20px;
        }

        .nav-content {
            max-width: 935px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Container Principal do Perfil */
        .profile-container {
            max-width: 935px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* Cabeçalho do Perfil */
        .profile-header {
            display: flex;
            margin-bottom: 44px;
        }

        .profile-pic-container {
            flex: 1;
            display: flex;
            justify-content: center;
            margin-right: 30px;
        }

        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #dbdbdb;
            padding: 4px;
        }

        .profile-info {
            flex: 2;
        }

        .profile-title {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .username {
            font-size: 28px;
            font-weight: 300;
            margin-right: 20px;
        }

        .btn-edit {
            background-color: #efefef;
            border: none;
            padding: 7px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-right: 15px;
            transition: background 0.2s;
        }

        .btn-edit:hover {
            background-color: #dbdbdb;
        }

        .settings-icon {
            font-size: 24px;
            cursor: pointer;
        }

        .profile-stats {
            display: flex;
            list-style: none;
            margin-bottom: 20px;
        }

        .profile-stats li {
            margin-right: 40px;
            font-size: 16px;
        }

        .stat-count {
            font-weight: 600;
        }

        .profile-bio {
            font-size: 16px;
            line-height: 1.5;
        }

        .name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .bio-text i {
            width: 20px;
            color: #555;
            text-align: center;
            margin-right: 5px;
        }

        .bio-link {
            color: #00376b;
            text-decoration: none;
            font-weight: 600;
        }

        /* Abas (Publicações, Reels, Marcados) */
        .profile-tabs {
            display: flex;
            justify-content: center;
            border-top: 1px solid #dbdbdb;
            margin-bottom: 20px;
        }

        .tab {
            margin: 0 30px;
            padding: 15px 0;
            font-size: 12px;
            font-weight: 600;
            color: #8e8e8e;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
        }

        .tab.active {
            color: #262626;
            border-top: 1px solid #262626;
            margin-top: -1px;
        }

        /* Grid de Fotos */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px;
        }

        .grid-item {
            position: relative;
            aspect-ratio: 1 / 1;
            cursor: pointer;
            background-color: #efefef;
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .grid-item .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            opacity: 0;
            transition: opacity 0.2s;
            gap: 20px;
        }

        .grid-item:hover .overlay {
            opacity: 1;
        }

        /* Responsividade para celular */
        @media (max-width: 768px) {
            .profile-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .profile-pic-container {
                margin-bottom: 20px;
            }
            .photo-grid {
                gap: 5px;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-content">
            <div class="logo">Instagram</div>
            <div class="nav-icons">
                <i class="fa-solid fa-house" style="margin-right: 15px; font-size: 20px;"></i>
                <i class="fa-brands fa-facebook-messenger" style="font-size: 20px;"></i>
            </div>
        </div>
    </nav>

    <main class="profile-container">
        
        <header class="profile-header">
            <div class="profile-pic-container">
                <img src="https://ui-avatars.com/api/?name=Tito+JPG&background=random&size=150&font-size=0.33" alt="Foto de Perfil" class="profile-pic">
            </div>
            
            <div class="profile-info">
                <div class="profile-title">
                    <h2 class="username">adnz.png</h2>
                    <button class="btn-edit" id="btn-follow">Seguir</button>
                    <button class="btn-edit">Mensagem</button>
                    <i class="fa-solid fa-ellipsis settings-icon"></i>
                </div>
                
                <ul class="profile-stats">
                    <li><span class="stat-count">9</span> publicações</li>
                    <li><span class="stat-count">1.7K</span> seguidores</li>
                    <li><span class="stat-count">256</span> seguindo</li>
                </ul>
                
                <div class="profile-bio">
                    <h1 class="name">tito</h1>
                    <p class="bio-text">
                        <i class="fa-solid fa-laptop-code"></i> IT / Software Dev<br>
                        <i class="fa-solid fa-server"></i> Server Admin & Builder<br>
                        <i class="fa-solid fa-pencil"></i> Digital Art & Aesthetics<br>
                        <i class="fa-solid fa-link"></i> <a href="#" class="bio-link">github.com/tito</a>
                    </p>
                </div>
            </div>
        </header>

        <div class="profile-tabs">
            <div class="tab active" id="tab-posts" onclick="switchTab('posts')">
                <i class="fa-solid fa-table-cells"></i> PUBLICAÇÕES
            </div>
            <div class="tab" id="tab-reels" onclick="switchTab('reels')">
                <i class="fa-solid fa-clapperboard"></i> REELS
            </div>
            <div class="tab" id="tab-tagged" onclick="switchTab('tagged')">
                <i class="fa-solid fa-user-tag"></i> MARCADOS
            </div>
        </div>

        <div class="photo-grid" id="posts-grid">
            </div>

    </main>

    <script>
        // Função para simular o botão de Seguir
        const btnFollow = document.getElementById('btn-follow');
        btnFollow.addEventListener('click', function() {
            if (this.innerText === 'Seguir') {
                this.innerText = 'Seguindo';
                this.style.backgroundColor = '#efefef';
                this.style.color = '#262626';
            } else {
                this.innerText = 'Seguir';
                this.style.backgroundColor = '#0095f6';
                this.style.color = '#fff';
            }
        });

        // Configuração inicial do botão para azul (padrão do Insta)
        btnFollow.style.backgroundColor = '#0095f6';
        btnFollow.style.color = '#fff';

        // Função para gerar fotos falsas no feed
        const grid = document.getElementById('posts-grid');
        
        function loadPosts() {
            grid.innerHTML = ''; // Limpa o grid
            // Gera 9 postagens
            for(let i = 1; i <= 9; i++) {
                // Usando o Lorem Picsum para puxar imagens aleatórias de tecnologia/arquitetura
                let imageUrl = `https://picsum.photos/400/400?random=${i + 10}`;
                
                grid.innerHTML += `
                    <div class="grid-item">
                        <img src="${imageUrl}" alt="Postagem ${i}">
                        <div class="overlay">
                            <span><i class="fa-solid fa-heart"></i> ${Math.floor(Math.random() * 800) + 50}</span>
                            <span><i class="fa-solid fa-comment" style="transform: scaleX(-1);"></i> ${Math.floor(Math.random() * 100)}</span>
                        </div>
                    </div>
                `;
            }
        }

        // Função para trocar de abas
        function switchTab(tabName) {
            // Remove a classe active de todas as abas
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            
            // Adiciona na aba clicada
            if(tabName === 'posts') {
                document.getElementById('tab-posts').classList.add('active');
                loadPosts();
            } else if(tabName === 'reels') {
                document.getElementById('tab-reels').classList.add('active');
                grid.innerHTML = '<div style="grid-column: span 3; text-align: center; padding: 50px; color: #8e8e8e;">Nenhum Reel ainda.</div>';
            } else if(tabName === 'tagged') {
                document.getElementById('tab-tagged').classList.add('active');
                grid.innerHTML = '<div style="grid-column: span 3; text-align: center; padding: 50px; color: #8e8e8e;">Nenhuma foto marcada.</div>';
            }
        }

        // Carrega as postagens ao abrir a página
        loadPosts();
    </script>
</body>
</html>
